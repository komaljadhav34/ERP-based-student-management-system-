<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notices & Circulars</title>
<style>
body{margin:0;font-family:"Poppins",sans-serif;background:#f4f9ff;color:#333;}
.navbar{background:linear-gradient(90deg,#1e3a8a,#60a5fa);color:white;display:flex;justify-content:space-between;align-items:center;padding:15px 30px;}
.navbar h2{margin:0;font-size:1.5rem;}
.logout-btn{background:#e74c3c;border:none;padding:10px 20px;border-radius:8px;color:white;cursor:pointer;}
.logout-btn:hover{background:#c0392b;}
.container{max-width:1200px;margin:50px auto;padding:0 20px;}
h1{font-size:1.8rem;color:#1e3a8a;margin-bottom:30px;text-align:center;}
.content{background:white;padding:25px;border-radius:15px;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
button{background:#1e3a8a;color:white;border:none;padding:10px 15px;border-radius:8px;margin-top:15px;cursor:pointer;}
button:hover{background:#274bb5;}
</style>
</head>
<body>
<div class="navbar">
<h2>Notices & Circulars</h2>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>
<div class="container">
<h1>Notices & Circulars</h1>
<div class="content">
<p>Publish and manage notices and circulars for staff and students. You can:</p>
<ul>
<li>Create new notices or circulars</li>
<li>Send important updates to specific departments</li>
<li>Archive past announcements for reference</li>
</ul>
<button onclick="backToDashboard()">Back to Dashboard</button>
</div>
</div>
<script>
function logout(){ window.location.href="home.html"; }
function backToDashboard(){ window.location.href="nonteaching-dashboard.html"; }
</script>
</body>
</html>
