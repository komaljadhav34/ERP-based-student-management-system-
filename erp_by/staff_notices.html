<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send Notices - CollegeERP</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: #f4f9ff;
    }

    .navbar {
      background: linear-gradient(90deg, #1e3a8a, #60a5fa);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
    }

    .navbar h2 {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: 0.5px;
    }

    .btn-red {
      background: #e74c3c;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .btn-red:hover {
      background: #c0392b;
    }

    .container {
      max-width: 800px;
      margin: 50px auto;
      padding: 0 20px;
    }

    h1 {
      text-align: center;
      color: #1e3a8a;
      margin-bottom: 30px;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #274bb5;
    }

    .back-btn {
      margin-top: 20px;
      background: #1e3a8a;
    }
  </style>
</head>

<body>
  <div class="navbar">
    <h2>DoodleDesk</h2>
    <button class="btn-red" onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <h1>Send Notices</h1>

    <label>Notice Title:</label>
    <input type="text" id="noticeTitle" placeholder="Enter title">

    <label>Notice Content:</label>
    <textarea id="noticeContent" placeholder="Enter notice"></textarea>

    <button onclick="saveNotice()">Send Notice</button>

    <h2>All Notices</h2>
    <ul id="noticeList"></ul>

    <button class="back-btn" onclick="goBack()">Back to Dashboard</button>
  </div>

  <script>
    async function saveNotice() {
      let title = document.getElementById("noticeTitle").value;
      let content = document.getElementById("noticeContent").value;
      if (!title || !content) { alert("Enter all fields!"); return; }

      const token = localStorage.getItem("token");
      if (!token) { alert("Please login first"); window.location.href = "staff-login.html"; return; }

      try {
        const response = await fetch("/api/notifications", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({
            title: title,
            message: content
          })
        });

        if (response.ok) {
          alert("Notice sent! Students will see this notice.");
          displayNotices();
        } else {
          const data = await response.json();
          alert("Error: " + (data.error || "Failed to send"));
        }
      } catch (err) {
        console.error(err);
        alert("Server error");
      }
    }

    async function displayNotices() {
      const token = localStorage.getItem("token");
      if (!token) return;

      try {
        const response = await fetch("/api/notifications", {
          headers: { "Authorization": "Bearer " + token }
        });
        if (response.ok) {
          const notices = await response.json();
          let ul = document.getElementById("noticeList");
          ul.innerHTML = "";
          notices.forEach(n => {
            let li = document.createElement("li");
            li.innerHTML = `<b>${n.title}</b>: ${n.message}`;
            ul.appendChild(li);
          });
        }
      } catch (err) {
        console.error(err);
      }
    }
    displayNotices();

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("username");
      localStorage.removeItem("role");
      window.location.href = "home.html";
    }
    function goBack() { window.location.href = "non_teaching_dashboard.html"; }
  </script>
</body>

</html>
