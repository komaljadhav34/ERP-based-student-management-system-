<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Hostel - CollegeERP</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: #f4f9ff;
    }

    .navbar {
      background: linear-gradient(90deg, #1e3a8a, #60a5fa);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
    }

    .navbar h2 {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: 0.5px;
    }

    .btn-red {
      background: #e74c3c;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .btn-red:hover {
      background: #c0392b;
    }

    .container {
      max-width: 800px;
      margin: 50px auto;
      padding: 0 20px;
    }

    h1 {
      text-align: center;
      color: #1e3a8a;
      margin-bottom: 30px;
    }

    input,
    select {
      padding: 8px 12px;
      width: 100%;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #274bb5;
    }

    .back-btn {
      margin-top: 20px;
      background: #1e3a8a;
    }
  </style>
</head>

<body>
  <div class="navbar">
    <h2>DoodleDesk</h2>
    <button class="btn-red" onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <h1>Manage Hostel Info</h1>

    <label>Student Username:</label>
    <input type="text" id="studentName" placeholder="Enter student username">

    <label>Room Number:</label>
    <input type="text" id="roomNumber" placeholder="Enter room number">

    <label>Hostel Name:</label>
    <input type="text" id="hostelName" placeholder="Enter hostel name">

    <button onclick="saveHostel()">Save Hostel Info</button>

    <h2>All Hostel Info</h2>
    <ul id="hostelList"></ul>

    <button class="back-btn" onclick="goBack()">Back to Dashboard</button>
  </div>

  <script>
    // Save hostel info
    // Save hostel info
    async function saveHostel() {
      let name = document.getElementById("studentName").value.trim();
      let room = document.getElementById("roomNumber").value.trim();
      let hostel = document.getElementById("hostelName").value.trim();
      if (!name || !room || !hostel) { alert("Enter all fields!"); return; }

      const token = localStorage.getItem("token");
      if (!token) { alert("Please login first"); window.location.href = "staff-login.html"; return; }

      try {
        const response = await fetch("/api/hostel", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({
            student: name,
            room: room,
            block: hostel // Mapping hostel name to block for now based on API
          })
        });

        if (response.ok) {
          alert("Hostel info saved! Students will see this info.");
          displayHostel();
        } else {
          const data = await response.json();
          alert("Error: " + (data.error || "Failed to save"));
        }
      } catch (err) {
        console.error(err);
        alert("Server error");
      }
    }

    async function displayHostel() {
      const token = localStorage.getItem("token");
      if (!token) return;

      try {
        const response = await fetch("/api/hostel", {
          headers: { "Authorization": "Bearer " + token }
        });
        if (response.ok) {
          const hostelData = await response.json();
          let ul = document.getElementById("hostelList");
          ul.innerHTML = "";
          hostelData.forEach(h => {
            let li = document.createElement("li");
            li.textContent = `${h.student} - Room: ${h.room}, Block: ${h.block}`;
            ul.appendChild(li);
          });
        }
      } catch (err) {
        console.error(err);
      }
    }
    displayHostel();

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("username");
      localStorage.removeItem("role");
      window.location.href = "home.html";
    }
    function goBack() { window.location.href = "non_teaching_dashboard.html"; }
  </script>
</body>

</html>
