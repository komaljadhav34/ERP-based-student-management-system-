<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Marks - CollegeERP</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: #f4f9ff;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0px 3px 10px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #1e3a8a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th,
    td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    th {
      background: #1e3a8a;
      color: white;
    }

    input[type="number"] {
      width: 80px;
      padding: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      text-align: center;
    }

    .submit-btn {
      margin-top: 25px;
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .submit-btn:hover {
      background: #274bb5;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      background: #555;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .back-btn:hover {
      background: #333;
    }

    .filters {
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .filters select {
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Enter Marks</h2>
    <button type="button" class="back-btn" onclick="goToDashboard()">Back to Dashboard</button>

    <div class="filters">
      <select id="filterBranch" onchange="filterStudents()">
        <option value="">All Branches</option>
        <option value="CSE">CSE</option>
        <option value="IT">IT</option>
        <option value="ENTC">ENTC</option>
        <option value="Mech">Mechanical</option>
        <option value="Civil">Civil</option>
      </select>
      <select id="filterYear" onchange="filterStudents()">
        <option value="">All Years</option>
        <option value="FE">FE</option>
        <option value="SE">SE</option>
        <option value="TE">TE</option>
        <option value="BE">BE</option>
      </select>
    </div>

    <form id="marksForm">
      <table>
        <thead>
          <tr>
            <th>Roll No</th>
            <th>Student Name</th>
            <th>Details</th>
            <th>Marks</th>
          </tr>
        </thead>
        <tbody>
          <!-- Dynamic rows -->
        </tbody>
      </table>

      <button type="submit" class="submit-btn">Submit Marks</button>
    </form>
  </div>

  <script>
    let allStudents = [];

    // Fetch students on load
    document.addEventListener("DOMContentLoaded", async () => {
      const token = localStorage.getItem("token");
      if (!token) { window.location.href = "staff-login.html"; return; }

      try {
        const response = await fetch("/api/students", {
          headers: { "Authorization": "Bearer " + token }
        });
        if (response.ok) {
          allStudents = await response.json();
          // Sort by branch then year then name
          allStudents.sort((a, b) => (a.branch || "").localeCompare(b.branch || "") || (a.year || "").localeCompare(b.year || "") || a.username.localeCompare(b.username));

          filterStudents(); // Initial render
        } else {
          console.error("Failed to fetch students");
          const errText = await response.text();
          alert("Failed to load students: " + response.status + " " + response.statusText + "\n" + errText);
        }
      } catch (err) {
        console.error(err);
        alert("Error loading students: " + err.message);
      }
    });

    function filterStudents() {
      const branch = document.getElementById("filterBranch").value;
      const year = document.getElementById("filterYear").value;
      const tbody = document.querySelector("tbody");
      tbody.innerHTML = "";

      const filtered = allStudents.filter(s => {
        return (branch === "" || s.branch === branch) && (year === "" || s.year === year);
      });

      if (filtered.length === 0) {
        tbody.innerHTML = "<tr><td colspan='4'>No students found</td></tr>";
        return;
      }

      filtered.forEach((s, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${s.fullname || s.username}</td>
          <td>${s.branch || "-"} / ${s.year || "-"}</td>
          <td>
            <input type="number" name="marks_${s.username}" min="0" max="100" placeholder="Enter marks" data-username="${s.username}">
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Submit marks
    document.getElementById("marksForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const token = localStorage.getItem("token");
      if (!token) { alert("Please login first"); window.location.href = "staff-login.html"; return; }

      const rows = document.querySelectorAll("tbody tr");
      const promises = [];

      rows.forEach(row => {
        const input = row.querySelector("input[type='number']");
        if (!input) return;

        const studentUsername = input.dataset.username;
        const marks = input.value;

        if (marks) {
          const p = fetch("/api/marks", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
              student: studentUsername,
              subject: "General", // Hardcoded for now
              marks: marks
            })
          });
          promises.push(p);
        }
      });

      try {
        await Promise.all(promises);
        alert("Marks submitted successfully!");
        document.getElementById("marksForm").reset();
      } catch (err) {
        console.error(err);
        alert("Error submitting marks");
      }
    });

    // Back to dashboard
    function goToDashboard() {
      window.location.href = "teaching.html";
    }
  </script>

</body>

</html>
