<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fees - Student Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: #f4f9ff;
      color: #333;
    }

    .navbar {
      background: linear-gradient(90deg, #1e3a8a, #60a5fa);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
    }

    .navbar h2 {
      margin: 0;
      font-size: 1.5rem;
    }

    .logout-btn {
      background: #e74c3c;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .logout-btn:hover {
      background: #c0392b;
    }

    .container {
      max-width: 800px;
      margin: 50px auto;
      padding: 0 20px;
    }

    h1 {
      text-align: center;
      color: #1e3a8a;
      margin-bottom: 30px;
    }

    .content {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    table,
    th,
    td {
      border: 1px solid #333;
    }

    th,
    td {
      padding: 8px;
      text-align: left;
    }

    button {
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 8px;
      margin-top: 20px;
    }

    button:hover {
      background: #274bb5;
    }
  </style>
</head>

<body>
  <div class="navbar">
    <h2>Fees</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <h1>Fee Details</h1>
    <div class="content" id="feesContent">
      <!-- Fee info will load here -->
    </div>
    <button onclick="backToDashboard()">Back to Dashboard</button>
  </div>

  <script>
    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("username");
      localStorage.removeItem("role");
      window.location.href = "student-login.html";
    }
    function backToDashboard() { window.location.href = "student-dashboard.html"; }

    async function loadFees() {
      const token = localStorage.getItem("token");
      if (!token) { alert("No student logged in"); window.location.href = "student-login.html"; return; }

      const container = document.getElementById("feesContent");

      try {
        const response = await fetch("/api/fees", {
          headers: { "Authorization": "Bearer " + token }
        });

        if (!response.ok) {
          if (response.status === 401) logout();
          throw new Error("Failed to fetch fees");
        }

        const fees = await response.json();

        if (!fees || fees.length === 0) { container.innerHTML = "<p>No fee data found.</p>"; return; }

        // Assuming fees is a list of fee records
        let html = `
      <table>
        <tr><th>Amount</th><th>Due Date</th><th>Paid</th></tr>
        ${fees.map(f => `<tr><td>₹${f.amount}</td><td>${f.due_date}</td><td>${f.paid ? 'Yes' : 'No'}</td></tr>`).join('')}
      </table>
    `;
        container.innerHTML = html;
      } catch (err) {
        console.error(err);
        container.innerHTML = "<p>Error loading fees.</p>";
      }
    }

    loadFees();
  </script>
</body>

</html>
