<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Student Details - CollegeERP</title>
<style>
body{margin:0;font-family:"Poppins",sans-serif;background:#f4f9ff;}
.navbar{background:linear-gradient(90deg,#1e3a8a,#60a5fa);color:white;display:flex;justify-content:space-between;align-items:center;padding:15px 30px;}
.navbar h2{margin:0;font-size:1.5rem;}
.btn-red{background:#e74c3c;border:none;padding:10px 20px;border-radius:8px;color:white;cursor:pointer;}
.btn-red:hover{background:#c0392b;}
.container{max-width:900px;margin:50px auto;padding:0 20px;}
h1{text-align:center;color:#1e3a8a;margin-bottom:30px;}
input,select{padding:8px 12px;width:100%;margin-bottom:15px;border-radius:6px;border:1px solid #ccc;}
button{padding:10px 20px;background:#1e3a8a;color:white;border:none;border-radius:8px;cursor:pointer;}
button:hover{background:#274bb5;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th, td{border:1px solid #333;padding:10px;text-align:left;}
th{background:#1e3a8a;color:white;}
</style>
</head>
<body>

<div class="navbar">
<h2>DoodleDesk</h2>
<button class="btn-red" onclick="logout()">Logout</button>
</div>

<div class="container">
<h1>Manage Student Details</h1>

<label>Student Name:</label>
<input type="text" id="studentName" placeholder="Enter student name">
<label>Roll Number:</label>
<input type="text" id="rollNumber" placeholder="Enter roll number">
<label>Branch:</label>
<input type="text" id="branch" placeholder="Enter branch">
<label>Email:</label>
<input type="email" id="email" placeholder="Enter email">
<label>Phone:</label>
<input type="text" id="phone" placeholder="Enter phone number">
<label>Address:</label>
<input type="text" id="address" placeholder="Enter address">
<label>Emergency Contact:</label>
<input type="text" id="emergency" placeholder="Enter emergency contact">
<label>Total Fees:</label>
<input type="number" id="totalFees" placeholder="Enter total fees">
<label>Fees Paid:</label>
<input type="number" id="feesPaid" placeholder="Enter fees paid">
<label>Hostel Name:</label>
<input type="text" id="hostelName" placeholder="Enter hostel name">
<label>Room Number:</label>
<input type="text" id="roomNumber" placeholder="Enter room number">
<label>Academic Year:</label>
<select id="academicYear">
<option value="">Select Year</option>
<option>First Year</option>
<option>Second Year</option>
<option>Third Year</option>
<option>Final Year</option>
</select>

<button onclick="saveStudent()">Save Student</button>

<h2>All Students</h2>
<table>
<thead>
<tr>
<th>Name</th><th>Roll Number</th><th>Branch</th><th>Email</th><th>Phone</th><th>Action</th>
</tr>
</thead>
<tbody id="studentTable"></tbody>
</table>
</div>

<script>
function logout(){ window.location.href="home.html"; }

function saveStudent(){
    let student = {
        name: document.getElementById("studentName").value.trim(),
        roll: document.getElementById("rollNumber").value.trim(),
        branch: document.getElementById("branch").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        address: document.getElementById("address").value.trim(),
        emergency: document.getElementById("emergency").value.trim(),
        totalFees: document.getElementById("totalFees").value.trim(),
        feesPaid: document.getElementById("feesPaid").value.trim(),
        hostelName: document.getElementById("hostelName").value.trim(),
        roomNumber: document.getElementById("roomNumber").value.trim(),
        academicYear: document.getElementById("academicYear").value
    };

    if(!student.name || !student.roll){ alert("Name and Roll Number required"); return; }

    let students = JSON.parse(localStorage.getItem("students") || "[]");
    let index = students.findIndex(s=>s.roll===student.roll);

    if(index>=0){
        students[index] = student; // update existing student
    } else{
        students.push(student); // add new student
    }

    localStorage.setItem("students", JSON.stringify(students));
    alert("Student details saved!");
    displayStudents();
}

function displayStudents(){
    let students = JSON.parse(localStorage.getItem("students") || "[]");
    let tbody = document.getElementById("studentTable");
    tbody.innerHTML="";
    students.forEach(s=>{
        let tr=document.createElement("tr");
        tr.innerHTML=`<td>${s.name}</td><td>${s.roll}</td><td>${s.branch}</td><td>${s.email}</td><td>${s.phone}</td>
        <td><button onclick='editStudent("${s.roll}")'>Edit</button></td>`;
        tbody.appendChild(tr);
    });
}

function editStudent(roll){
    let students = JSON.parse(localStorage.getItem("students") || "[]");
    let student = students.find(s=>s.roll===roll);
    if(student){
        document.getElementById("studentName").value = student.name;
        document.getElementById("rollNumber").value = student.roll;
        document.getElementById("branch").value = student.branch;
        document.getElementById("email").value = student.email;
        document.getElementById("phone").value = student.phone;
        document.getElementById("address").value = student.address;
        document.getElementById("emergency").value = student.emergency;
        document.getElementById("totalFees").value = student.totalFees;
        document.getElementById("feesPaid").value = student.feesPaid;
        document.getElementById("hostelName").value = student.hostelName;
        document.getElementById("roomNumber").value = student.roomNumber;
        document.getElementById("academicYear").value = student.academicYear;
    }
}

displayStudents();
</script>
</body>
</html>
