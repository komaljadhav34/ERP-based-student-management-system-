<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exams - Student Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: #f4f9ff;
      color: #333;
    }

    .navbar {
      background: linear-gradient(90deg, #1e3a8a, #60a5fa);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
    }

    .navbar h2 {
      margin: 0;
      font-size: 1.5rem;
    }

    .logout-btn {
      background: #e74c3c;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .logout-btn:hover {
      background: #c0392b;
    }

    .container {
      max-width: 1200px;
      margin: 50px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 1.8rem;
      color: #1e3a8a;
      margin-bottom: 30px;
      text-align: center;
    }

    .content {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    table,
    th,
    td {
      border: 1px solid #333;
    }

    th,
    td {
      padding: 8px;
      text-align: left;
    }

    button {
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 8px;
      margin-top: 15px;
    }

    button:hover {
      background: #274bb5;
    }
  </style>
</head>

<body>
  <div class="navbar">
    <h2>Exams</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
  <div class="container">
    <h1>Exams Schedule & Results</h1>
    <div class="content">
      <table>
        <tr>
          <th>Exam</th>
          <th>Date</th>
          <th>Marks</th>
          <th>Status</th>
        </tr>
        <tr>
          <td>Midterm - DBMS</td>
          <td>12/09/2025</td>
          <td>85</td>
          <td>Passed</td>
        </tr>
        <tr>
          <td>Midterm - Networks</td>
          <td>15/09/2025</td>
          <td>90</td>
          <td>Passed</td>
        </tr>
        <tr>
          <td>Final - Web Dev</td>
          <td>30/10/2025</td>
          <td>-</td>
          <td>Pending</td>
        </tr>
      </table>
      <button onclick="backToDashboard()">Back to Dashboard</button>
    </div>
  </div>
  <script>
    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("username");
      localStorage.removeItem("role");
      window.location.href = "student-login.html";
    }
    function backToDashboard() { window.location.href = "student-dashboard.html"; }

    async function loadExams() {
      const token = localStorage.getItem("token");
      if (!token) { window.location.href = "student-login.html"; return; }

      try {
        const response = await fetch("/api/exams", {
          headers: { "Authorization": "Bearer " + token }
        });

        if (!response.ok) {
          if (response.status === 401) logout();
          throw new Error("Failed to fetch exams");
        }

        const exams = await response.json();
        const table = document.querySelector("table");

        // Clear existing rows except header
        while (table.rows.length > 1) { table.deleteRow(1); }

        if (!exams || exams.length === 0) {
          const row = table.insertRow();
          row.innerHTML = "<td colspan='4'>No exams found.</td>";
          return;
        }

        exams.forEach(exam => {
          const row = table.insertRow();
          row.innerHTML = `<td>${exam.title}</td><td>${exam.date}</td><td>-</td><td>${exam.details || 'Scheduled'}</td>`;
        });
      } catch (err) {
        console.error(err);
      }
    }

    loadExams();
  </script>
</body>

</html>
