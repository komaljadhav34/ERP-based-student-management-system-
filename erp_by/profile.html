<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Student Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: #f4f9ff;
      color: #333;
    }

    .navbar {
      background: linear-gradient(90deg, #1e3a8a, #60a5fa);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
    }

    .navbar h2 {
      margin: 0;
      font-size: 1.5rem;
    }

    .logout-btn {
      background: #e74c3c;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .logout-btn:hover {
      background: #c0392b;
    }

    .container {
      max-width: 800px;
      margin: 50px auto;
      padding: 0 20px;
    }

    h1 {
      text-align: center;
      color: #1e3a8a;
      margin-bottom: 30px;
    }

    .content {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    p {
      margin: 8px 0;
      font-size: 1rem;
    }

    button {
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 8px;
      margin-top: 20px;
    }

    button:hover {
      background: #274bb5;
    }
  </style>
</head>

<body>
  <div class="navbar">
    <h2>Profile</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <h1>Student Profile</h1>
    <div class="content" id="profileContent">
      <!-- Profile data will be loaded here -->
    </div>
    <button onclick="backToDashboard()">Back to Dashboard</button>
  </div>

  <script>
    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("username");
      localStorage.removeItem("role");
      window.location.href = "student-login.html";
    }
    function backToDashboard() { window.location.href = "student-dashboard.html"; }

    async function loadProfile() {
      const token = localStorage.getItem("token");
      if (!token) { alert("No student logged in"); window.location.href = "student-login.html"; return; }

      const container = document.getElementById("profileContent");

      try {
        const response = await fetch("/api/profile", {
          headers: { "Authorization": "Bearer " + token }
        });

        if (!response.ok) {
          if (response.status === 401) logout();
          throw new Error("Failed to fetch profile");
        }

        const student = await response.json();

        container.innerHTML = `
      <p><strong>Name:</strong> ${student.fullname || student.username}</p>
      <p><strong>Role:</strong> ${student.role}</p>
      <p><strong>Email:</strong> ${student.email || "N/A"}</p>
      <!-- Add more fields if available in DB schema -->
    `;
      } catch (err) {
        console.error(err);
        container.innerHTML = "<p>Error loading profile.</p>";
      }
    }

    loadProfile();
  </script>
</body>

</html>
