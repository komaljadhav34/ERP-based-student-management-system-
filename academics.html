    }

    .logout-btn:hover {
      background: #c0392b;

    .container {

      border-radius: 15px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    table,
    th,
    td {
      border: 1px solid #333;
    }

    th,
    td {
      padding: 8px;
      text-align: left;
    }

    button {
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 8px;
      margin-top: 15px;
    }

    button:hover {

    }
  </style>
</head>

                <script>
                  function logout() {
                    localStorage.removeItem("token");
                  localStorage.removeItem("username");
                  localStorage.removeItem("role");
                  window.location.href = "student-login.html";
    }
                  function backToDashboard() {window.location.href = "student-dashboard.html"; }

                  async function loadAcademics() {
      const token = localStorage.getItem("token");
                  if (!token) {window.location.href = "student-login.html"; return; }

                  try {
        // Fetch marks
        const marksRes = await fetch("/api/marks", {headers: {"Authorization": "Bearer " + token } });
                  // Fetch attendance
                  const attRes = await fetch("/api/attendance", {headers: {"Authorization": "Bearer " + token } });

                  if (!marksRes.ok || !attRes.ok) {
          if (marksRes.status === 401 || attRes.status === 401) logout();
                  throw new Error("Failed to fetch academics");
        }

                  const marks = await marksRes.json();
                  const attendance = await attRes.json();

                  // Calculate attendance percentage
                  let totalDays = attendance.length;
        let presentDays = attendance.filter(a => a.status === 'Present').length;
        let attPercentage = totalDays > 0 ? ((presentDays / totalDays) * 100).toFixed(1) : "0";

                  const container = document.querySelector(".content");

                  // Reconstruct content
                  let html = `
                  <p><strong>Courses Enrolled:</strong> Computer Networks, Database Management, Web Development</p>
                  <p><strong>Attendance:</strong> ${attPercentage}% (${presentDays}/${totalDays} days)</p>
                  <p><strong>Assignments:</strong></p>
                  <ul>
                    <li>Assignment 1: Submitted</li>
                    <li>Assignment 2: Pending</li>
                    <li>Assignment 3: Graded</li>
                  </ul>
                  <p><strong>Grades:</strong></p>
                  `;

                  if (!marks || marks.length === 0) {
                    html += "<p>No grades found.</p>";
        } else {
                    html += `
            <table>
              <tr><th>Course</th><th>Marks</th></tr>
              ${marks.map(m => `<tr><td>${m.subject}</td><td>${m.marks}</td></tr>`).join('')}
            </table>
          `;
        }

                  html += `<button onclick="backToDashboard()">Back to Dashboard</button>`;
        container.innerHTML = html;

      } catch (err) {
        console.error(err);
        alert("Error loading academic info");
      }
    }


    loadAcademics();
  </script>
