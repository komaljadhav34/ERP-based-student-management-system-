<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login - DoodleDesk</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      background: url('home.jpg') no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: rgba(0, 0, 0, 0.7);
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      color: white;
    }

    .login-box h2 {
      margin-bottom: 20px;
    }

    .login-box input,
    .login-box select,
    .login-box button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
    }

    .login-box input,
    .login-box select {
      background: #f1f1f1;
    }

    .login-box button {
      background: #ff9800;
      color: white;
      cursor: pointer;
    }

    .login-box button:hover {
      background: #e68900;
    }

    .error {
      color: red;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="login-box">
    <h2>Staff Login</h2>
    <form id="staffForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <select id="staffType" required>
        <option value="">Select Staff Type</option>
        <option value="teaching">Teaching</option>
        <option value="nonteaching">Non-Teaching</option>
      </select>
      <button type="submit">Login</button>
      <p id="errorMsg" class="error"></p>
    </form>
  </div>

  <script>
    document.getElementById("staffForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const staffType = document.getElementById("staffType").value;
      const errorMsg = document.getElementById("errorMsg");

      if (username === "" || password === "" || staffType === "") {
        errorMsg.textContent = "All fields are required!";
        return;
      }

      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          let allowed = false;
          if (staffType === "teaching" && data.role === "teacher") allowed = true;
          if (staffType === "nonteaching" && (data.role === "admin" || data.role === "staff")) allowed = true;

          if (!allowed) {
            errorMsg.textContent = "Role mismatch. Please select correct staff type.";
            return;
          }

          localStorage.setItem("token", data.token);
          localStorage.setItem("username", data.username);
          localStorage.setItem("role", data.role);

          if (staffType === "teaching") {
            window.location.href = "teaching.html";
          } else {
            window.location.href = "non_teaching_dashboard.html";
          }
        } else {
          errorMsg.textContent = data.error || "Login failed";
        }
      } catch (err) {
        console.error(err);
        errorMsg.textContent = "Server error. Please try again.";
      }
    });
  </script>
</body>

</html>
